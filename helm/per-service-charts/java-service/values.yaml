    cpu: "1"
    memory: "1Gi"

  requests:
    cpu: 300m
    memory: 512Mi

############################################################
# HEALTH ENDPOINT CONFIGURATION
#
# PURPOSE:
# Used dynamically by:
# - liveness probes
# - readiness probes
# - Helm test connections
#
# Java Spring Boot exposes health checks through:
# /actuator/health
############################################################

health:

  endpoint: /actuator/health

############################################################
# HEALTH PROBES
############################################################

livenessProbe:

  httpGet:
    path: /actuator/health
    port: 8080

  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:

  httpGet:
    path: /actuator/health
    port: 8080

  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

############################################################
# HORIZONTAL POD AUTOSCALER
############################################################

autoscaling:

  enabled: true

  minReplicas: 3

  maxReplicas: 8

  targetCPUUtilizationPercentage: 65

############################################################
# NODE SCHEDULING
############################################################

nodeSelector: {}

############################################################
# TOLERATIONS
############################################################

tolerations: []

############################################################
# AFFINITY RULES
############################################################

affinity: {}

############################################################
# POD DISRUPTION BUDGET
############################################################

podDisruptionBudget:

  enabled: true

  minAvailable: 1

############################################################
# NETWORK POLICY
############################################################

networkPolicy:

  enabled: true

  ingress:
    enabled: false

  egress:
    enabled: true

############################################################
# ENVIRONMENT VARIABLES
############################################################

env:

  SPRING_PROFILES_ACTIVE: production

  SERVER_PORT: "8080"

############################################################
# CONFIGMAP DATA
############################################################

config:

  springProfilesActive: "prod"

  javaOpts: "-Xms256m -Xmx512m"

############################################################
# SECRET VALUES
#
# DO NOT COMMIT REAL VALUES.
#
# Use:
# - External Secrets
# - AWS Secrets Manager
# - Sealed Secrets
############################################################

secrets:

  DATABASE_URL: ""

  API_KEY: ""

############################################################
# TESTS
############################################################

tests:

  enabled: true

