############################################################
# KUBERNETES SECRET
#
# PURPOSE:
# Stores sensitive runtime configuration
# for the JavaScript API service.
#
# ENTERPRISE FEATURES:
# - Secure secret injection
# - Environment-specific secrets
# - GitOps compatible
# - Runtime credential management
############################################################

apiVersion: v1

kind: Secret

metadata:

  name: {{ include "javascript-api.fullname" . }}

  labels:
    {{- include "javascript-api.labels" . | nindent 4 }}

############################################################
# SECRET TYPE
############################################################

type: Opaque

############################################################
# SECRET DATA
#
# Values must be base64 encoded.
############################################################

data:

  ##########################################################
  # DATABASE CREDENTIALS
  ##########################################################

  DATABASE_URL: {{ .Values.secrets.databaseUrl | b64enc | quote }}

  DATABASE_USERNAME: {{ .Values.secrets.databaseUsername | b64enc | quote }}

  DATABASE_PASSWORD: {{ .Values.secrets.databasePassword | b64enc | quote }}

  ##########################################################
  # APPLICATION SECRETS
  ##########################################################

  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}

  API_KEY: {{ .Values.secrets.apiKey | b64enc | quote }}