############################################################
# HORIZONTAL POD AUTOSCALER
#
# PURPOSE:
# Automatically scales the JavaScript API pods
# based on CPU and memory utilization.
#
# ENTERPRISE FEATURES:
# - Dynamic scaling
# - Resource efficiency
# - High availability
# - Cost optimization
############################################################

{{- if .Values.autoscaling.enabled }}

apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:

  name: {{ include "rust-service.fullname" . }}

  labels:
    {{- include "rust-service.labels" . | nindent 4 }}

spec:

  ##########################################################
  # TARGET DEPLOYMENT
  ##########################################################

  scaleTargetRef:

    apiVersion: apps/v1

    kind: Deployment

    name: {{ include "rust-service.fullname" . }}

  ##########################################################
  # MIN/MAX REPLICAS
  ##########################################################

  minReplicas: {{ .Values.autoscaling.minReplicas }}

  maxReplicas: {{ .Values.autoscaling.maxReplicas }}

  ##########################################################
  # METRICS
  ##########################################################

  metrics:

    ########################################################
    # CPU UTILIZATION
    ########################################################

    - type: Resource

      resource:

        name: cpu

        target:

          type: Utilization

          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}

{{- end }}