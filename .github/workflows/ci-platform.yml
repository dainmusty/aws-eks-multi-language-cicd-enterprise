############################################################
# PLATFORM CI PIPELINE (ENTERPRISE VALIDATION LAYER)
#
# PURPOSE:
# This pipeline acts as a "guard rail" for the platform.
#
# It ensures:
# - Infrastructure code is safe (Terraform)
# - Kubernetes manifests are valid
# - Helm charts are correct
# - Security issues are detected early
# - No broken or insecure changes reach deployment pipelines
#
# IMPORTANT:
# This pipeline DOES NOT deploy anything.
# It only validates and enforces standards.
############################################################

name: Platform CI

############################################################
# TRIGGERS
############################################################

on:

  ##########################################################
  # Run on PRs to main branches
  ##########################################################

  pull_request:
    branches:
      - develop
      - main

    paths:
      - "terraform/**"
      - "helm/**"
      - "k8s/**"
      - ".github/**"

  ##########################################################
  # Run on pushes for early detection of issues
  ##########################################################

  push:
    branches:
      - develop
      - main

    paths:
      - "terraform/**"
      - "helm/**"
      - "k8s/**"
      - ".github/**"

############################################################
# PERMISSIONS
############################################################

permissions:
  contents: read
  security-events: write

############################################################
# CONCURRENCY CONTROL
#
# Prevents duplicate runs on same branch
############################################################

concurrency:
  group: platform-ci-${{ github.ref }}
  cancel-in-progress: true

############################################################
# GLOBAL VARIABLES
############################################################

env:
  TF_VERSION: "1.12.2"
  HELM_VERSION: "3.17.3"

############################################################
# JOBS
############################################################

jobs:

  ##########################################################
  # 1. TERRAFORM VALIDATION
  ##########################################################

  terraform-validation:

    name: Terraform Validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:

      ######################################################
      # Checkout code
      ######################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ######################################################
      # Setup Terraform
      ######################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      ######################################################
      # Format check
      ######################################################

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      ######################################################
      # Init (no backend needed for validation)
      ######################################################

      - name: Terraform Init
        run: terraform init -backend=false

      ######################################################
      # Validate syntax + structure
      ######################################################

      - name: Terraform Validate
        run: terraform validate

  ##########################################################
  # 2. TERRAFORM SECURITY SCANNING
  ##########################################################

  terraform-security:

    name: Terraform Security Scan
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      ######################################################
      # tfsec - Infrastructure security rules
      ######################################################

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform

      ######################################################
      # Checkov - Policy-as-code enforcement
      ######################################################

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
          framework: terraform

  ##########################################################
  # 3. KUBERNETES + HELM VALIDATION
  ##########################################################

  kubernetes-validation:

    name: Kubernetes & Helm Validation
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      ######################################################
      # Setup Helm
      ######################################################

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      ######################################################
      # Helm linting (detect template errors early)
      ######################################################

      - name: Helm Lint (JavaScript API)
        run: helm lint helm/javascript-api

      - name: Helm Lint (Java Service)
        run: helm lint helm/java-service

      - name: Helm Lint (Rust Processor)
        run: helm lint helm/rust-processor

      ######################################################
      # Install kubeconform (Kubernetes schema validation)
      ######################################################

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz

          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/

      ######################################################
      # Validate rendered Kubernetes manifests
      ######################################################

      - name: Validate Helm Templates

        run: |

          helm template javascript-api helm/javascript-api | kubeconform -strict -summary

          helm template java-service helm/java-service | kubeconform -strict -summary

          helm template rust-processor helm/rust-processor | kubeconform -strict -summary

  ##########################################################
  # 4. GLOBAL SECURITY SCANNING
  ##########################################################

  security-scanning:

    name: Security Scanning
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      ######################################################
      # Secret detection
      ######################################################

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      ######################################################
      # SAST scanning (code vulnerabilities)
      ######################################################

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: auto

      ######################################################
      # Filesystem vulnerability scan
      ######################################################

      - name: Run Trivy (Filesystem mode)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

  ##########################################################
  # 5. YAML VALIDATION
  ##########################################################

  yaml-validation:

    name: YAML Validation
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run YAML Lint
        uses: ibiqlik/action-yamllint@v3

  ##########################################################
  # 6. PLATFORM GATE (FINAL CHECK)
  ##########################################################

  platform-summary:

    name: Platform Validation Summary
    runs-on: ubuntu-latest

    needs:
      - terraform-validation
      - terraform-security
      - kubernetes-validation
      - security-scanning
      - yaml-validation

    steps:

      - name: Success Message
        run: |
          echo "====================================="
          echo " PLATFORM CI PASSED SUCCESSFULLY "
          echo "====================================="
          echo "Terraform: VALID"
          echo "Kubernetes: VALID"
          echo "Security: PASSED"
          echo "YAML: VALID"
          echo "====================================="