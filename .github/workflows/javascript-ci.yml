############################################################
# JAVASCRIPT MICROSERVICE CI PIPELINE
#
# PURPOSE:
# Enterprise CI pipeline for:
# - Linting
# - Unit Testing
# - Dependency Scanning
# - Docker Build
# - Container Scanning
# - ECR Push
#
# SERVICE:
# services/javascript-api
#
# TRIGGER:
# Runs only when JavaScript service changes.
############################################################

name: JavaScript CI

############################################################
# TRIGGERS
############################################################

on:

  push:

    branches:
      - main
      - develop

    paths:
      - "services/javascript-api/**"

  pull_request:

    branches:
      - main

    paths:
      - "services/javascript-api/**"

############################################################
# ENVIRONMENT VARIABLES
############################################################

env:

  AWS_REGION: us-east-1

  ECR_REPOSITORY: polyglot/javascript-api

  SERVICE_PATH: services/javascript-api

############################################################
# JOBS
############################################################

jobs:

  build-test-scan-push:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:

    ########################################################
    # CHECKOUT SOURCE CODE
    ########################################################

    - name: Checkout Repository
      uses: actions/checkout@v4

    ########################################################
    # SETUP NODE.JS
    ########################################################

    - name: Setup Node.js
      uses: actions/setup-node@v4

      with:
        node-version: "20"

        cache: npm

        cache-dependency-path: |
          services/javascript-api/package-lock.json

    ########################################################
    # INSTALL DEPENDENCIES
    ########################################################

    - name: Install Dependencies

      working-directory: ${{ env.SERVICE_PATH }}

      run: npm ci

    ########################################################
    # ESLINT
    #
    # Fails pipeline if linting issues exist.
    ########################################################

    - name: Run ESLint

      working-directory: ${{ env.SERVICE_PATH }}

      run: npm run lint

    ########################################################
    # UNIT TESTS
    ########################################################

    - name: Run Unit Tests

      working-directory: ${{ env.SERVICE_PATH }}

      run: npm test

    
    ########################################################
    # BUILD STEP
    #
    # Not required.
    # Service runs directly via Node.js.
    ########################################################

    - name: Skip Build Step
      run: echo "No build stage required for JavaScript service."

    ########################################################
    # AWS AUTHENTICATION
    #
    # Uses GitHub OIDC.
    ########################################################

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    ########################################################
    # LOGIN TO ECR
    ########################################################

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    ########################################################
    # BUILD IMAGE
    ########################################################

    - name: Build Docker Image
      working-directory: ${{ env.SERVICE_PATH }}
      run: |
        docker build \
          -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
          -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
          .

    ########################################################
    # TRIVY IMAGE SCAN
    #
    # Fails on HIGH/CRITICAL vulnerabilities.
    ########################################################

    - name: Scan Docker Image
      uses: aquasecurity/trivy-action@0.28.0
      with:
        image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        format: table
        severity: HIGH,CRITICAL
        exit-code: "1"
        ignore-unfixed: true

    ########################################################
    # PUSH IMAGE TO ECR
    ########################################################

    - name: Push Docker Image
      run: |
        docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

    ########################################################
    # SAVE TEST REPORTS (OPTIONAL)
    ########################################################

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: javascript-ci-artifacts
        path: |
          services/javascript-api/package.json
        retention-days: 7