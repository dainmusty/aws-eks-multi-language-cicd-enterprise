############################################################
# JAVASCRIPT MICROSERVICE CI PIPELINE
#
# PURPOSE:
# Enterprise CI pipeline for:
# - ESLint Linting
# - Unit Testing
# - Security Scan
# - Docker Build
# - Container Scanning
# - Docker Push
#
# SERVICE:
# services/javascript-api
#
# TRIGGER:
# Runs only when JavaScript service changes.
############################################################

name: JavaScript CI

############################################################
# TRIGGERS
############################################################

on:
  push:
    branches:
      - dev
      - staging
      - main
    paths:
      - "polyglot-microservices/backend/javascript-api/**"

  pull_request:
    branches:
      - main
    paths:
      - "polyglot-microservices/backend/javascript-api/**"

############################################################
# ENVIRONMENT VARIABLES
############################################################

env:
  AWS_REGION: us-east-1
  DOCKER_REPOSITORY: dainmusty/javascript-api  # Docker Hub repository name
  SERVICE_PATH: polyglot-microservices/backend/javascript-api/

############################################################
# JOBS
############################################################

jobs:

############################################################
# DETERMINE SECURITY LEVEL
############################################################

  determine-scan-level:

    runs-on: ubuntu-latest

    outputs:

      scan-level: ${{ steps.level.outputs.scan-level }}

    steps:

      - name: Determine Scan Level

        id: level

        run: |

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "scan-level=full" >> $GITHUB_OUTPUT

          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            echo "scan-level=comprehensive" >> $GITHUB_OUTPUT

          else
            echo "scan-level=fast" >> $GITHUB_OUTPUT
          fi

############################################################
# SECURITY WORKFLOW
############################################################

  security:

    needs: determine-scan-level

    uses: ./.github/workflows/security-scanning.yml

    with:

      scan-level: ${{ needs.determine-scan-level.outputs.scan-level }}

    secrets: inherit

  ##########################################################
  # BUILD / TEST / PACKAGE / PUSH
  ##########################################################
  build-test-package-push:
    needs: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4


############################################################
# RUST TOOLCHAIN
############################################################
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            polyglot-microservices/backend/javascript-api/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ env.SERVICE_PATH }}
        run: npm run lint

      - name: Run Unit Tests
        working-directory: ${{ env.SERVICE_PATH }}
        run: npm test

      - name: Skip Build Step
        run: echo "No build stage required for JavaScript service."


  ##########################################################
  # DOCKER AUTHENTICATION, BUILD, SCAN, AND PUSH
  ##########################################################
   
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.DOCKER_REPOSITORY }}:${{ github.sha }} \
            -t ${{ env.DOCKER_REPOSITORY }}:latest \
            .

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ env.DOCKER_REPOSITORY }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Push Docker Image
        run: |
          docker push ${{ env.DOCKER_REPOSITORY }}:${{ github.sha }}
          docker push ${{ env.DOCKER_REPOSITORY }}:latest


############################################################
# BUILD ARTIFACTS
############################################################

      - name: Upload Build Artifacts

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: javascript-ci-artifacts

          path: |
            polyglot-microservices/backend/javascript-api/

          retention-days: 7          