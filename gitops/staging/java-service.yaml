apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-service-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/polyglot-microservices
    targetRevision: staging
    path: helm/shared-platform-chart/microservice
    helm:
      valueFiles:
        - values-java.yaml
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: polyglot-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
