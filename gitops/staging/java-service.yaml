apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-service-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dainmusty/aws-eks-multi-language-cicd-enterprise.git
    targetRevision: staging
    path: helm/per-servie-charts/microservice
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: polyglot-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
