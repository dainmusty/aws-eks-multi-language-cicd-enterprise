apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: react-dashboard-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dainmusty/aws-eks-multi-language-cicd-enterprise.git
    targetRevision: main
    path: helm/per-service-charts/frontend
    helm:
      valueFiles:
        - values.yaml
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: polyglot-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
