apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: polyglot-ingress
  namespace: polyglot-dev

spec:
  ingressClassName: nginx

  rules:

  ##########################################################
  # SINGLE HOST
  ##########################################################

  - host: dashboard.local

    http:

      paths:

      ######################################################
      # REACT DASHBOARD
      ######################################################

      - path: /
        pathType: Prefix
        backend:
          service:
            name: react-dashboard-dev
            port:
              number: 80

      ######################################################
      # JAVASCRIPT API
      ######################################################

      - path: /api/js
        pathType: Prefix
        backend:
          service:
            name: javascript-api-dev
            port:
              number: 80

      ######################################################
      # JAVA SERVICE
      ######################################################

      - path: /api/java
        pathType: Prefix
        backend:
          service:
            name: java-service-dev
            port:
              number: 80

      ######################################################
      # RUST PROCESSOR
      ######################################################

      - path: /api/rust
        pathType: Prefix
        backend:
          service:
            name: rust-processor-dev
            port:
              number: 80