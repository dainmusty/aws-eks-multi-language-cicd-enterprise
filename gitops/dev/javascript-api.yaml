apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: javascript-api-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/polyglot-microservices
    targetRevision: develop
    path: helm/shared-platform-chart/microservice
    helm:
      valueFiles:
        - values-javascript.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: polyglot-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
